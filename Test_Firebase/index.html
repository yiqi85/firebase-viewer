<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Realtime Database Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Firebase Realtime Database Viewer</h1>
            <p>View historical device data with interactive graphs</p>
        </header>

        <div class="config-section">
            <div class="config-group">
                <label for="firebase-config">Firebase Configuration (JSON):</label>
                <textarea id="firebase-config" placeholder='{ "apiKey": "...", "databaseURL": "...", ... }' rows="6"></textarea>
                <button onclick="initializeFirebase()">Connect to Firebase</button>
                <span id="connection-status" class="status">Not Connected</span>
            </div>

            <div class="config-group">
                <label for="device-id">Device ID (e.g., ANGSTROM_ID_1):</label>
                <input type="text" id="device-id" placeholder="ANGSTROM_ID_1">
                <button onclick="loadDeviceData()">Load Data</button>
            </div>

            <div class="config-group">
                <label for="date-picker">Select Date:</label>
                <input type="date" id="date-picker">
                <button onclick="loadDataForDate()">Load Date Data</button>
            </div>
        </div>

        <div class="limits-section">
            <h3>Set Data Limits</h3>
            <div class="limits-group">
                <div class="limit-input">
                    <label for="upper-limit">Upper Limit (dotted line):</label>
                    <input type="number" id="upper-limit" placeholder="100" step="0.1">
                </div>
                <div class="limit-input">
                    <label for="lower-limit">Lower Limit (dotted line):</label>
                    <input type="number" id="lower-limit" placeholder="0" step="0.1">
                </div>
                <button onclick="updateLimits()">Apply Limits</button>
            </div>
            <div class="region-colors">
                <label>Region Colors:</label>
                <div class="color-input">
                    <label for="above-color">Above Upper Limit:</label>
                    <input type="color" id="above-color" value="#ff6b6b" title="Color for values above upper limit">
                </div>
                <div class="color-input">
                    <label for="normal-color">Normal Range:</label>
                    <input type="color" id="normal-color" value="#51cf66" title="Color for values within limits">
                </div>
                <div class="color-input">
                    <label for="below-color">Below Lower Limit:</label>
                    <input type="color" id="below-color" value="#4dabf7" title="Color for values below lower limit">
                </div>
            </div>
        </div>

        <div class="data-display-section">
            <div class="controls">
                <button onclick="resetZoom()" class="reset-btn">Reset Zoom</button>
                <label>
                    <input type="checkbox" id="show-limits" checked onchange="updateCharts()">
                    Show Limit Lines
                </label>
                <label>
                    <input type="checkbox" id="show-background" checked onchange="updateCharts()">
                    Show Background Regions
                </label>
            </div>

            <div id="charts-container" class="charts-container">
                <!-- Charts will be dynamically generated here -->
            </div>
        </div>

        <footer>
            <p>Tip: Scroll to zoom in/out. Click and drag to pan. Double-click to reset zoom for individual chart.</p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
